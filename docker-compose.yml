services:
  commercialbrainz-plex:
    build: .
    ports:
      - "8765:8765"
    environment:
      PORT: "8765"
      BASE_URL: "http://localhost:8765"
      API_BASE_URL: "https://commercialbrainz.duckdns.org/api/v1"
      SITE_BASE_URL: "https://commercialbrainz.duckdns.org"
      PHASH_THRESHOLD: "12"
      ENABLE_AUDIO_FINGERPRINT: "true"
      MEDIA_ROOTS: "/media"
      FFMPEG_PATH: "ffmpeg"
      FFPROBE_PATH: "ffprobe"
      FPCALC_PATH: "fpcalc"
    volumes:
      # Mount the same commercials library path Plex uses (read-only).
      - /path/to/commercials:/media:ro
    restart: unless-stopped
