name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore CommercialBrainz.PlexProvider.slnx

      - name: Build
        run: dotnet build CommercialBrainz.PlexProvider.slnx -c Release --no-restore

      - name: Test
        run: dotnet test CommercialBrainz.PlexProvider.slnx -c Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish src/CommercialBrainz.PlexProvider/CommercialBrainz.PlexProvider.csproj
          -c Release
          -o "${{ github.workspace }}/artifacts/CommercialBrainz.PlexProvider"
          --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommercialBrainz.PlexProvider
          path: ${{ github.workspace }}/artifacts/CommercialBrainz.PlexProvider
          if-no-files-found: error
